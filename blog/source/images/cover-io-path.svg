<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="I/O Path Observability">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1722"/>
      <stop offset="100%" stop-color="#050a0f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#8ad6ff" stroke-width="1">
    <path d="M0 90h1200M0 180h1200M0 270h1200M0 360h1200M0 450h1200M0 540h1200"/>
    <path d="M96 0v630M192 0v630M288 0v630M384 0v630M480 0v630M576 0v630M672 0v630M768 0v630M864 0v630M960 0v630M1056 0v630"/>
  </g>
  <text x="86" y="108" fill="#8ad6ff" font-size="24" font-family="Source Code Pro, monospace">I/O / PAGE CACHE / BLOCK LAYER</text>
  <text x="86" y="168" fill="#eff6ff" font-size="54" font-family="Roboto Slab, serif">Read Path Observability</text>
  <text x="86" y="214" fill="#9fb4c9" font-size="24" font-family="Roboto Slab, serif">把一次 read() 拆成 VFS、page cache、filesystem 与 block layer</text>
  <rect x="174" y="286" width="840" height="72" rx="14" fill="none" stroke="#8ad6ff" stroke-width="2"/>
  <rect x="214" y="382" width="760" height="72" rx="14" fill="none" stroke="#8ecea6" stroke-width="2"/>
  <rect x="254" y="478" width="680" height="72" rx="14" fill="none" stroke="#ffbf69" stroke-width="2"/>
  <text x="212" y="332" fill="#8ad6ff" font-size="22" font-family="Source Code Pro, monospace">read() -> VFS -> file_operations -> page cache lookup</text>
  <text x="246" y="428" fill="#8ecea6" font-size="22" font-family="Source Code Pro, monospace">cache miss -> readahead -> filesystem mapping</text>
  <text x="286" y="524" fill="#ffbf69" font-size="22" font-family="Source Code Pro, monospace">bio submit -> request queue -> device completion</text>
</svg>

